---
# Homelab Ansible Inventory — Production
# Control node: ThinkPad T480 (10.0.10.20)

all:
  vars:
    ansible_user: trickooo
    ansible_ssh_private_key_file: ~/.ssh/ansible_homelab
    ansible_python_interpreter: /usr/bin/python3

  children:
    management:
      hosts:
        thinkpad-t480:
          ansible_host: 10.0.10.20
          node_role: ansible_control

    proxmox_hosts:
      hosts:
        desktop-pc:
          ansible_host: 10.0.10.12
          ansible_user: trickooo
          node_role: proxmox_host
  
    lxc:
      hosts:
        adguard:
          ansible_host: 10.0.10.5
          ansible_user: root

    nas:
      hosts:
        zimablade:
          ansible_host: 10.0.99.10
          ansible_user: trickooo
          ansible_become: true
