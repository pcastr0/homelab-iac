---
# proxmox-host role — Custom Desktop PC (10.0.10.11)

- name: Disable Proxmox enterprise repo
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/pve-enterprise.sources
    regexp: 'Enabled: true'
    replace: 'Enabled: false'
    backup: yes
  tags: [repos]
#
# - name: Add Proxmox no-subscription repo
#   ansible.builtin.copy:
#     dest: /etc/apt/sources.list.d/pve-no-subscription.sources
#     content: |
#       deb http://download.proxmox.com/debian/pve bookworm pve-no-subscription
#     mode: '0644'
#   tags: [repos]

- name: Upgrade all packages
  ansible.builtin.apt:
    update_cache: yes
    upgrade: dist
    cache_valid_time: 3600
  tags: [packages, updates]

- name: Set system timezone
  community.general.timezone:
    name: '{{ proxmox_timezone }}'
  tags: [system]

- name: Harden SSH — key-only, no root
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    mode: '0600'
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart SSH
  tags: [ssh, security]

# - name: UFW — default deny incoming
#   community.general.ufw:
#     state: enabled
#     default: deny
#     direction: incoming
